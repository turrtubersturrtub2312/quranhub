<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quranhub V2 - Mega Update</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f4f7f6; --card: #ffffff; --text: #2c3e50; --accent: #27ae60; --border: #ddd; }
        body.premium-theme {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1500622855241-077d5163f995?auto=format&fit=crop&w=1350&q=80');
            background-size: cover; background-attachment: fixed;
            --card: rgba(255, 255, 255, 0.2); --text: #fff; --border: rgba(255,255,255,0.3); backdrop-filter: blur(10px);
        }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; transition: 0.5s; }
        .container { max-width: 900px; margin: auto; }

        /* LOADING SCREEN */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100000; transition: 0.5s; }
        .progress-box { width: 250px; height: 10px; background: #eee; border-radius: 10px; overflow: hidden; margin-top: 15px; }
        #progress-fill { width: 0%; height: 100%; background: var(--accent); }

        /* HEADER & STATS */
        .status-bar { display: flex; justify-content: space-between; align-items: center; background: var(--card); padding: 15px; border-radius: 15px; border: 1px solid var(--border); margin-bottom: 20px; }
        #goalVal { color: #ffcc00; font-weight: bold; font-size: 1.4rem; } /* Update Warna Nombor Goal */

        /* UPDATE 1: KHATAM TRACKER */
        .khatam-box { background: var(--accent); color: white; padding: 15px; border-radius: 12px; margin-bottom: 20px; }
        .progress-khatam { background: rgba(255,255,255,0.3); height: 8px; border-radius: 5px; margin-top: 10px; }
        #khatam-fill { background: white; height: 100%; width: 0%; border-radius: 5px; transition: 1s; }

        /* UPDATE 4: AUDIO SYNC HIGHLIGHT */
        .reading-ayat { padding: 15px; border-radius: 10px; transition: 0.3s; margin-bottom: 10px; border-bottom: 1px solid var(--border); }
        .reading-ayat.active { background: rgba(39, 174, 96, 0.2); border-left: 5px solid var(--accent); }
        .teks-arab { font-family: 'Amiri'; font-size: 30px; text-align: right; direction: rtl; line-height: 2.2; }

        /* UPDATE 2 & 5: TADABBUR & BOOKMARK */
        .actions { display: flex; gap: 10px; margin-top: 10px; }
        .btn-sm { padding: 5px 10px; font-size: 12px; border-radius: 5px; border: none; cursor: pointer; }
        .note-area { width: 100%; margin-top: 10px; display: none; padding: 10px; border-radius: 5px; border: 1px solid var(--border); }

        .surah-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; }
        .card { background: var(--card); padding: 20px; border-radius: 12px; border: 1px solid var(--border); cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        
        .btn { padding: 10px 15px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        #homePage, #ayatPage { display: none; }
    </style>
</head>
<body>

    <div id="loading-screen">
        <h1 id="ld-text">0%</h1>
        <div class="progress-box"><div id="progress-fill"></div></div>
    </div>

    <div class="container">
        <div class="status-bar">
            <div>Goal: <span id="goalVal">0</span> ⚽</div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#3498db; color:white;" onclick="bukaBookmarks()">⭐ Simpanan</button>
                <button class="btn" style="background:gold;" onclick="togglePremium()">👑 Get A Pro</button>
            </div>
        </div>

        <div class="khatam-box" id="khatamUI">
            <strong>Progres Khatam 30 Juzuk</strong>
            <div class="progress-khatam"><div id="khatam-fill"></div></div>
            <small id="khatamText">0 dari 114 Surah selesai</small>
        </div>

        <div id="homePage" style="display:block;">
            <div class="surah-grid" id="listSurah"></div>
        </div>

        <div id="ayatPage">
            <button class="btn" style="background:var(--accent); color:white; margin-bottom:20px;" onclick="goHome()">← Kembali</button>
            <h2 id="judulSurah" style="text-align:center;"></h2>
            <div id="contentAyat"></div>
        </div>
    </div>

    <script>
        let goals = parseInt(localStorage.getItem('goals')) || 0;
        let isPremium = localStorage.getItem('isPro') === 'true';
        let khatamCount = JSON.parse(localStorage.getItem('khatamCount')) || [];
        let bookmarks = JSON.parse(localStorage.getItem('bookmarks')) || [];

        window.onload = () => {
            // Loading 0-100%
            let p = 0;
            let int = setInterval(() => {
                p++;
                document.getElementById('ld-text').innerText = p + "%";
                document.getElementById('progress-fill').style.width = p + "%";
                if(p >= 100) { clearInterval(int); document.getElementById('loading-screen').style.display='none'; }
            }, 20);

            updateUI();
            muatSenaraiSurah();
        };

        function updateUI() {
            document.getElementById('goalVal').innerText = goals;
            if(isPremium) document.body.classList.add('premium-theme');
            
            // Update Khatam Progress
            const perc = (khatamCount.length / 114) * 100;
            document.getElementById('khatam-fill').style.width = perc + "%";
            document.getElementById('khatamText').innerText = `${khatamCount.length} dari 114 Surah dibaca`;
        }

        async function muatSenaraiSurah() {
            const res = await fetch('https://api.quran.com/api/v4/chapters?language=ms');
            const data = await res.json();
            const list = document.getElementById('listSurah');
            data.chapters.forEach(s => {
                const card = document.createElement('div');
                card.className = 'card';
                card.onclick = () => bukaSurah(s.id, s.name_simple);
                card.innerHTML = `<div><strong>${s.id}. ${s.name_simple}</strong></div><div style="font-family:Amiri; color:var(--accent); font-size:20px;">${s.name_arabic}</div>`;
                list.appendChild(card);
            });
        }

        async function bukaSurah(id, nama) {
            document.getElementById('homePage').style.display = 'none';
            document.getElementById('ayatPage').style.display = 'block';
            document.getElementById('judulSurah').innerText = "Surah " + nama;
            const area = document.getElementById('contentAyat');
            area.innerHTML = "Memuatkan...";

            const res = await fetch(`https://api.quran.com/api/v4/quran/verses/uthmani?chapter_number=${id}`);
            const data = await res.json();
            
            area.innerHTML = "";
            data.verses.forEach((v, i) => {
                const key = `${id}:${i+1}`;
                area.innerHTML += `
                    <div class="reading-ayat" id="ayat-${i}">
                        <div class="teks-arab">${v.text_uthmani}</div>
                        <div class="actions">
                            <button class="btn-sm" style="background:#f1c40f" onclick="mainAudio('${v.verse_key}', ${i})">▶️ Dengar</button>
                            <button class="btn-sm" style="background:#3498db; color:white;" onclick="saveBookmark('${key}')">⭐ Simpan</button>
                            <button class="btn-sm" style="background:#95a5a6; color:white;" onclick="toggleNote(${i})">✍️ Tadabbur</button>
                        </div>
                        <textarea id="note-${i}" class="note-area" placeholder="Tulis nota tadabbur anda..."></textarea>
                    </div>`;
            });

            // Update Khatam Tracker
            if(!khatamCount.includes(id)) {
                khatamCount.push(id);
                localStorage.setItem('khatamCount', JSON.stringify(khatamCount));
            }
            
            goals += 3;
            if(id == 87) { alert("RAHSIA AL-A'LA! +573 GOAL"); goals += 573; }
            localStorage.setItem('goals', goals);
            updateUI();
            window.scrollTo(0,0);
        }

        // UPDATE 4: AUDIO SYNC (Highlight ayat)
        function mainAudio(verseKey, index) {
            // Reset highlight
            document.querySelectorAll('.reading-ayat').forEach(el => el.classList.remove('active'));
            // Highlight ayat semasa
            document.getElementById(`ayat-${index}`).classList.add('active');
            
            const url = `https://audio.qurancentral.com/mishary-rashid-alafasy/mishary-rashid-alafasy-${verseKey.replace(':', '')}.mp3`;
            const audio = new Audio(url);
            audio.play();
            audio.onended = () => document.getElementById(`ayat-${index}`).classList.remove('active');
        }

        // UPDATE 2: TADABBUR
        function toggleNote(index) {
            const note = document.getElementById(`note-${index}`);
            note.style.display = (note.style.display === 'block') ? 'none' : 'block';
        }

        // UPDATE 5: BOOKMARK
        function saveBookmark(key) {
            if(!bookmarks.includes(key)) {
                bookmarks.push(key);
                localStorage.setItem('bookmarks', JSON.stringify(bookmarks));
                alert("Ayat disimpan dalam Bookmarks!");
            }
        }

        function goHome() {
            document.getElementById('homePage').style.display = 'block';
            document.getElementById('ayatPage').style.display = 'none';
            updateUI();
        }

        function togglePremium() {
            if(goals >= 573) { goals -= 573; isPremium = true; localStorage.setItem('isPro', 'true'); updateUI(); alert("Premium Aktif!"); }
            else { alert("Goal tidak cukup!"); }
        }
    </script>
</body>
</html>
